<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedstrijdlijst Fierljeppen</title>
  <style>
    :root {
      --blauw: #003f7f;
      --lichtblauw: #e8f0fb;
      --oranje: #e87722;
      --groen: #2a7a2a;
      --grijs: #f5f5f5;
      --tekst: #1a1a1a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f4fa;
      color: var(--tekst);
      min-height: 100vh;
    }

    header {
      background: var(--blauw);
      color: white;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    #wedstrijd-info {
      font-size: 0.85rem;
      opacity: 0.85;
    }

    #countdown-wrap {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.85rem;
      background: rgba(255,255,255,0.12);
      padding: 0.3rem 0.8rem;
      border-radius: 2rem;
    }

    #countdown-wrap .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4caf50;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    main {
      padding: 1rem 1rem 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    #error-banner {
      display: none;
      background: #fdecea;
      color: #c62828;
      border: 1px solid #f5c6c6;
      border-radius: 6px;
      padding: 0.7rem 1rem;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }

    .categorie-blok {
      background: white;
      border-radius: 10px;
      box-shadow: 0 1px 6px rgba(0,63,127,0.10);
      margin-bottom: 1.5rem;
      overflow: hidden;
    }

    .categorie-header {
      background: var(--blauw);
      color: white;
      padding: 0.65rem 1rem;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.01em;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    thead th {
      background: var(--lichtblauw);
      color: var(--blauw);
      font-weight: 700;
      text-align: left;
      padding: 0.55rem 0.75rem;
      white-space: nowrap;
      border-bottom: 2px solid #c5d8f0;
    }

    tbody tr:nth-child(even) { background: var(--grijs); }
    tbody tr:hover { background: #dbeafe; }

    tbody td {
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid #e8e8e8;
    }

    .pl { font-weight: 700; text-align: center; min-width: 2rem; }
    .pl-1 { color: #b8860b; }
    .pl-2 { color: #6b7280; }
    .pl-3 { color: #7c4a0e; }

    .nr { color: #666; text-align: center; min-width: 2.5rem; }
    .naam { font-weight: 600; }
    .club { font-weight: 400; color: #555; font-size: 0.82rem; }

    .afstand { text-align: center; font-variant-numeric: tabular-nums; min-width: 4rem; }
    .afstand.best { color: var(--groen); font-weight: 700; }
    .afstand.nat { color: #999; font-style: italic; }
    .afstand.afg { color: #c0392b; }

    .club { color: #555; font-size: 0.82rem; font-weight: 600; min-width: 2.5rem; }
    .pr { text-align: center; color: #666; font-size: 0.82rem; min-width: 3.5rem; }

    .beste-afstand { text-align: center; font-weight: 700; color: var(--blauw); min-width: 4.5rem; }

    .records-blok {
      background: white;
      border-radius: 10px;
      box-shadow: 0 1px 6px rgba(0,63,127,0.10);
      margin-bottom: 1.5rem;
      overflow: hidden;
    }

    .records-header {
      background: var(--oranje);
      color: white;
      padding: 0.65rem 1rem;
      font-weight: 700;
      font-size: 1rem;
    }

    .records-inhoud {
      padding: 0.75rem 1rem;
      font-size: 0.85rem;
      columns: 2 300px;
      gap: 2rem;
    }

    .records-inhoud p { margin-bottom: 0.3rem; break-inside: avoid; }
    .records-inhoud strong { color: var(--blauw); }

    #laad-indicator {
      text-align: center;
      padding: 3rem;
      color: #666;
      font-size: 1rem;
    }

    .spinner {
      display: inline-block;
      width: 24px; height: 24px;
      border: 3px solid #ccc;
      border-top-color: var(--blauw);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 0.5rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .tabel-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .kort { display: none; }

    @media (max-width: 600px) {
      table { font-size: 0.75rem; }
      .pr { min-width: 2.4rem; padding: 0.4rem 0.3rem; }
      .nr { min-width: 1.8rem; padding: 0.4rem 0.3rem; }
      .naam { white-space: nowrap; }
      .afstand, .beste-afstand { min-width: 2.4rem; padding: 0.4rem 0.3rem; text-align: center; }
      .club { min-width: 2rem; padding: 0.4rem 0.3rem; }
      .pl { min-width: 1.5rem; padding: 0.4rem 0.3rem; }
      tbody td, thead th { padding: 0.45rem 0.35rem; }
      .volledig { display: none; }
      .kort { display: inline; }
      header h1 { font-size: 1rem; }
      #wedstrijd-info { font-size: 0.75rem; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>🏆 Wedstrijdlijst Fierljeppen</h1>
    <div id="wedstrijd-info">Laden…</div>
  </div>
  <div id="countdown-wrap">
    <span class="dot"></span>
    <span id="countdown-tekst">Vernieuwen over 3:00</span>
  </div>
</header>

<main>
  <div id="error-banner"></div>
  <div id="inhoud"><div id="laad-indicator"><span class="spinner"></span> Wedstrijdgegevens ophalen…</div></div>
</main>

<script>
const INTERVAL_SEC = 180;
let timerSec = INTERVAL_SEC;
let countdownInterval;

function formatTijd(sec) {
  const m = Math.floor(sec / 60).toString().padStart(1, '0');
  const s = (sec % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

function startCountdown() {
  clearInterval(countdownInterval);
  timerSec = INTERVAL_SEC;
  countdownInterval = setInterval(() => {
    timerSec--;
    document.getElementById('countdown-tekst').textContent = `Vernieuwen over ${formatTijd(timerSec)}`;
    if (timerSec <= 0) {
      clearInterval(countdownInterval);
      laadData();
    }
  }, 1000);
}

function toonFout(bericht) {
  const el = document.getElementById('error-banner');
  el.textContent = bericht;
  el.style.display = 'block';
}

function verbergFout() {
  document.getElementById('error-banner').style.display = 'none';
}

function klasseAfstand(tekst) {
  if (!tekst || tekst.trim() === '') return 'afstand';
  const lower = tekst.toLowerCase();
  if (lower.includes('nat')) return 'afstand nat';
  if (lower.includes('afg')) return 'afstand afg';
  return 'afstand';
}

function bestePogingIndex(pogingen) {
  let best = -1, bestVal = -1;
  pogingen.forEach((p, i) => {
    const v = parseFloat(p.replace(',', '.'));
    if (!isNaN(v) && v > bestVal) { bestVal = v; best = i; }
  });
  return best;
}

function parseEnRender(html) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');

  // Wedstrijdnaam + datum uit eerste td met colspan
  const eersteCenter = doc.querySelector('td[colspan] center') || doc.querySelector('td center');
  const wedstrijdTitel = eersteCenter ? eersteCenter.textContent.trim() : '';
  const datumMatch = wedstrijdTitel.match(/\d{2}-\d{2}-\d{4}/);
  const naamMatch = wedstrijdTitel.split(' - ')[0].trim();
  const datum = datumMatch ? datumMatch[0] : '';
  document.getElementById('wedstrijd-info').textContent =
    (naamMatch || 'Wedstrijd') + (datum ? ` — ${datum}` : '');

  // Zoek alle inner tabellen met deelnemers:
  // Ze hebben een rij met tekst "Naam" als td
  const alleTables = [...doc.querySelectorAll('table table')];
  const deelnemersTables = alleTables.filter(t => {
    const cellen = [...t.querySelectorAll('td')].map(c => c.textContent.trim());
    return cellen.some(c => c === 'Naam') && cellen.some(c => c.includes('afstand'));
  });

  let output = '';

  deelnemersTables.forEach(table => {
    const rows = [...table.querySelectorAll('tr')];
    if (rows.length < 3) return;

    // Rij 0: categorienaam (zit in <font> element)
    const fontEl = rows[0].querySelector('font');
    const categorie = fontEl ? fontEl.textContent.trim() : rows[0].textContent.trim();

    // Rij 1: kolomhoofden — bouw een platte index-map met colspan
    // bijv. Nr. heeft colspan=2, dus neemt 2 posities in data-rijen
    const headerEls = [...rows[1].querySelectorAll('td')];
    let kolomMap = []; // kolomMap[dataIndex] = koptekst
    headerEls.forEach(td => {
      const tekst = td.textContent.trim();
      const span = parseInt(td.getAttribute('colspan') || '1');
      for (let s = 0; s < span; s++) kolomMap.push(tekst);
    });

    const iNr   = kolomMap.findIndex(h => h === 'Nr.');
    const iNaam = kolomMap.findIndex(h => h === 'Naam');
    const iPr   = kolomMap.findIndex(h => h === 'Pr.');
    const iAf   = kolomMap.reduce((acc, h, i) => {
      if (h.toLowerCase().includes('afstand')) acc.push(i);
      return acc;
    }, []);
    const iPl   = kolomMap.findLastIndex(h => h === 'Pl.');

    if (iNaam < 0 || iAf.length === 0) return;

    output += `<div class="categorie-blok">
      <div class="categorie-header">${escHtml(categorie)}</div>
      <div class="tabel-scroll"><table>
        <thead><tr>
          <th class="pl">Pl.</th>
          <th class="nr">Nr.</th>
          <th>Naam</th>
          <th class="club">Club</th>
          <th class="pr">PR</th>
          ${iAf.map((_, i) => `<th class="afstand"><span class="volledig">Poging ${i + 1}</span><span class="kort">P${i + 1}</span></th>`).join('')}
          <th class="beste-afstand">Beste</th>
        </tr></thead>
        <tbody>`;

    rows.slice(2).forEach(row => {
      const cellen = [...row.querySelectorAll('td')];
      if (cellen.length < 4) return;
      const get = (i) => i >= 0 && i < cellen.length ? cellen[i].textContent.trim() : '';

      const nr = get(iNr);
      const naamTd = iNaam >= 0 && iNaam < cellen.length ? cellen[iNaam] : null;
      const club = naamTd?.querySelector('sup')?.textContent.trim() || '';
      const naam = get(iNaam).replace(/\s*\(F\s*\d+\)/g, '').replace(club, '').trim();
      if (!naam || naam === 'Naam') return;

      const pr = get(iPr);
      const pogingen = iAf.map(i => get(i));
      const pl = get(iPl);

      // Beste poging: gebruik bgcolor op de td (YELLOW of #FF6600 = beste / record)
      // Anders bepaal op hoogste numerieke waarde
      let bestIdx = iAf.findIndex(i => {
        const bg = (cellen[i]?.getAttribute('bgcolor') || '').toUpperCase();
        return bg === 'YELLOW' || bg === '#FF6600';
      });
      if (bestIdx < 0) bestIdx = bestePogingIndex(pogingen);
      const besteWaarde = bestIdx >= 0 ? pogingen[bestIdx] : '';

      const plKlasse = pl === '1' ? 'pl pl-1' : pl === '2' ? 'pl pl-2' : pl === '3' ? 'pl pl-3' : 'pl';
      const plTekst = pl === '1' ? '🥇' : pl === '2' ? '🥈' : pl === '3' ? '🥉' : pl;

      output += `<tr>
        <td class="${plKlasse}">${plTekst || ''}</td>
        <td class="nr">${escHtml(nr)}</td>
        <td class="naam">${escHtml(naam)}</td>
        <td class="club">${escHtml(club)}</td>
        <td class="pr">${escHtml(pr)}</td>
        ${pogingen.map((p, i) => {
          const isBest = i === bestIdx && p && !['nat','afg.','afg',''].includes(p.toLowerCase().trim());
          return `<td class="${klasseAfstand(p)}${isBest ? ' best' : ''}">${escHtml(p) || '—'}</td>`;
        }).join('')}
        <td class="beste-afstand">${escHtml(besteWaarde) || '—'}</td>
      </tr>`;
    });

    output += `</tbody></table></div></div>`;
  });

  if (!output) {
    output = '<p style="padding:1rem;color:#666">Geen wedstrijdgegevens gevonden.</p>';
  }

  document.getElementById('inhoud').innerHTML = output;
}

function escHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function laadData() {
  verbergFout();
  try {
    const res = await fetch('/data');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const html = await res.text();
    parseEnRender(html);
  } catch (err) {
    toonFout(`Kon de wedstrijdgegevens niet ophalen: ${err.message}`);
  }
  startCountdown();
}

laadData();
</script>
</body>
</html>
