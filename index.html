<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fierljep — Live Scorebord</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Oswald:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f5f3; --bg2: #ffffff; --bg3: #f0f0ed;
    --border: rgba(0,0,0,0.07); --border2: rgba(0,0,0,0.13);
    --text: #1a1a1a; --muted: #888888;
    --accent: #1d6ef5; --accent2: #1558d0;
    --accent-subtle: rgba(29,110,245,0.08);
    --accent-text: #ffffff;
    --gold: #c47d00; --silver: #607080; --bronze: #9a4400;
    --pr: #d95a00; --season: #a07800; --nat: #cc2222; --live: #16a34a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }

  /* ── HEADER ── */
  header {
    background: var(--bg2); border-bottom: 1px solid var(--border2);
    padding: 0 2rem; display: flex; align-items: center;
    height: 56px; gap: 16px; transition: background 0.4s;
  }

  #sticky-bar { position: sticky; top: 0; z-index: 100; }
  .logo { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 20px; letter-spacing: 0.05em; text-transform: uppercase; flex-shrink: 0; }
  .logo span { color: var(--accent); }
  .live-pill { display: flex; align-items: center; gap: 6px; background: rgba(22,163,74,0.10); border: 1px solid rgba(22,163,74,0.35); border-radius: 999px; padding: 3px 10px; font-size: 11px; font-weight: 500; color: var(--live); font-family: 'DM Mono', monospace; letter-spacing: 0.08em; flex-shrink: 0; }
  .header-nav { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
  .nav-sep { width: 1px; height: 18px; background: var(--border2); margin: 0 4px; }
  .nav-link { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); text-decoration: none; padding: 5px 9px; border-radius: 6px; transition: color 0.15s, background 0.15s; white-space: nowrap; }
  .nav-link:hover { color: var(--text); background: var(--bg3); }
  .nav-link.nav-active { color: var(--accent); }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--live); animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

  .header-controls { display: flex; align-items: center; gap: 8px; flex: 1; justify-content: flex-end; min-width: 0; }

  /* datum picker */
  .datum-wrap { position: relative; flex-shrink: 0; }
  .datum-input {
    background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px;
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px;
    padding: 7px 12px; outline: none; transition: border-color 0.15s;
    cursor: pointer; width: 140px;
    color-scheme: light;
  }
  .datum-input:focus { border-color: var(--accent); }

  /* bond selector */
  .bond-wrap { position: relative; flex-shrink: 0; }
  .bond-select {
    background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px;
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px;
    padding: 7px 28px 7px 12px; outline: none; transition: border-color 0.15s;
    cursor: pointer; appearance: none; -webkit-appearance: none; width: 80px;
  }
  .bond-select:focus { border-color: var(--accent); }
  .bond-select option { background: #ffffff; }

  /* wedstrijd selector */
  .wedstrijd-wrap { position: relative; flex: 1; max-width: 380px; min-width: 0; }
  .wedstrijd-select {
    width: 100%; background: var(--bg3); border: 1px solid var(--border2);
    border-radius: 8px; color: var(--text); font-family: 'Inter', sans-serif;
    font-size: 13px; padding: 7px 32px 7px 12px; outline: none;
    transition: border-color 0.15s; cursor: pointer; appearance: none;
    -webkit-appearance: none;
  }
  .wedstrijd-select:focus { border-color: var(--accent); }
  .wedstrijd-select:disabled { opacity: 0.4; cursor: default; }
  .wedstrijd-select option { background: #ffffff; }
  .select-arrow { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 11px; pointer-events: none; }

  .update-time { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); white-space: nowrap; flex-shrink: 0; }

  /* ── WEDSTRIJD TITLE ── */
  .wedstrijd-title { background: var(--bg2); border-bottom: 3px solid var(--accent); padding: 10px 2rem; display: none; align-items: center; gap: 14px; transition: border-color 0.4s; }
  .club-logo { height: 36px; width: auto; max-width: 80px; object-fit: contain; flex-shrink: 0; }
  .club-logo.hidden { display: none; }
  .wedstrijd-titel-tekst { font-family: 'Oswald', sans-serif; font-size: 14px; font-weight: 600; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; }

  /* ── RONDE TABS ── */
  .ronde-tabs { display: flex; padding: 0 2rem; background: var(--bg2); border-bottom: 1px solid var(--border2); overflow-x: auto; }
  .ronde-tab { background: none; border: none; border-bottom: 2px solid transparent; color: var(--muted); cursor: pointer; font-family: 'Oswald', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.06em; padding: 12px 18px; text-transform: uppercase; transition: color 0.15s, border-color 0.15s; white-space: nowrap; }
  .ronde-tab:hover { color: var(--text); }
  .ronde-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── MAIN ── */
  main { padding: 1.5rem 2rem; }
  .schansen-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; }

  .schans-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .schans-header { background: var(--accent); border-bottom: 1px solid var(--border2); padding: 10px 14px; transition: background 0.4s; }
  .schans-title { font-family: 'Oswald', sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--accent-text); }

  .categorie-block { padding: 12px 14px; border-bottom: 1px solid var(--border); }
  .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 0 -14px; padding: 0 14px; }
  .table-scroll .springer-table { min-width: 400px; }
  .table-scroll .springer-table thead th { position: static; background: none; }
  .categorie-block:last-child { border-bottom: none; }
  .cat-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .cat-label { font-family: 'Oswald', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); }
  .cat-best { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
  .cat-best strong { color: var(--gold); font-weight: 500; }

  .springer-table { width: 100%; border-collapse: collapse; }
  .springer-table thead tr { border-bottom: 1px solid var(--border); }
  .springer-table thead th { font-family: 'DM Mono', monospace; font-size: 9px; font-weight: 500; letter-spacing: 0.1em; color: var(--muted); padding: 4px 4px 6px; text-align: center; text-transform: uppercase; position: sticky; top: 57px; background: var(--bg2); z-index: 2; }
  .springer-table thead th.left { text-align: left; }
  .springer-table tbody tr { border-bottom: 1px solid rgba(0,0,0,0.05); }
  .springer-table tbody tr:last-child { border-bottom: none; }
  .springer-table tbody tr:hover { background: rgba(0,0,0,0.025); }
  .springer-table tbody tr { height: 32px; }
  .springer-table td { padding: 0 4px; font-size: 12px; vertical-align: middle; }

  .td-nr { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); text-align: center; width: 22px; }
  .td-naam { max-width: 160px; font-size: 12px; vertical-align: middle; }
  .naam-inner { display: flex; align-items: center; justify-content: space-between; gap: 4px; overflow: hidden; }
  .naam-links { flex: 1; overflow: hidden; min-width: 0; }
  .naam-links .naam-tekst { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .td-naam.italic .naam-tekst { font-style: italic; }
  .naam-club { display: block; font-size: 8px; color: rgba(0,0,0,0.3); font-family: 'DM Mono', monospace; margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; letter-spacing: 0.04em; }
  .td-afstand { font-family: 'DM Mono', monospace; font-size: 10px; text-align: center; width: 38px; color: rgba(0,0,0,0.28); }
  .td-afstand.best { color: rgba(0,0,0,0.5); font-weight: 700; }
  .td-afstand.is-nat { color: rgba(204,34,34,0.5); }
  .td-beste { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 600; text-align: center; white-space: nowrap; color: var(--text); width: 52px; border-right: 1px solid var(--border2); }
  .td-beste.leeg { color: rgba(0,0,0,0.2); font-weight: 400; font-size: 11px; }
  .td-afstand.is-afwezig { color: rgba(0,0,0,0.2); }
  .tr-afwezig td { color: rgba(0,0,0,0.25) !important; }
  .td-afstand.is-empty { color: rgba(0,0,0,0.2); }
  .naam-badge { display: inline-block; font-family: 'DM Mono', monospace; font-size: 9px; font-weight: 500; letter-spacing: 0.06em; border-radius: 3px; padding: 1px 4px; flex-shrink: 0; }
  .naam-badge.pr { background: rgba(217,90,0,0.12); color: var(--pr); }
  .naam-badge.sr { background: rgba(160,120,0,0.12); color: var(--season); }
  .naam-badge.tr { background: rgba(0,160,80,0.12); color: #1a8a4a; }
  .naam-badge.nr { background: rgba(29,178,242,0.15); color: #0a7ab0; }
  .td-afstand.is-dim { color: rgba(0,0,0,0.3); font-size: 10px; border-right: 1px solid var(--border2); padding-right: 6px; }
  .springer-table th.dim-header { color: rgba(0,0,0,0.35); font-size: 8px; }
  .td-stand{ text-align: center; width: 28px; }
  .stand-badge { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 50%; font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; }
  .stand-1 { background: rgba(196,125,0,0.12); color: var(--gold); }
  .stand-2 { background: rgba(96,112,128,0.12); color: var(--silver); }
  .stand-3 { background: rgba(154,68,0,0.12); color: var(--bronze); }
  .stand-other { color: var(--muted); font-size: 10px; font-family: 'DM Mono', monospace; }

  .toggle-pogingen { display: flex; align-items: center; gap: 6px; background: none; border: none; color: var(--muted); cursor: pointer; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; padding: 12px 14px 12px 0; margin-left: auto; flex-shrink: 0; transition: color 0.15s; }
  .toggle-pogingen:hover { color: var(--text); }
  .toggle-dot { width: 28px; height: 16px; border-radius: 999px; background: var(--border2); position: relative; transition: background 0.2s; flex-shrink: 0; }
  .toggle-dot::after { content: ''; position: absolute; width: 10px; height: 10px; border-radius: 50%; background: #fff; top: 3px; left: 3px; transition: transform 0.2s; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
  .toggle-pogingen.actief { color: var(--accent); }
  .toggle-pogingen.actief .toggle-dot { background: var(--accent); }
  .toggle-pogingen.actief .toggle-dot::after { transform: translateX(12px); }
  body.hide-pogingen .td-afstand { display: none; }
  body.hide-pogingen .springer-table th:not(.left):not([style*="border-right"]) { display: none; }
  body.hide-pogingen .table-scroll .springer-table { min-width: 0; }

  .state-box { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5rem 2rem; text-align: center; gap: 12px; }
  .state-box .icon { font-size: 32px; opacity: 0.3; }
  .state-box p { color: var(--muted); font-size: 14px; max-width: 360px; line-height: 1.6; }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .legenda { display: flex; gap: 20px; flex-wrap: wrap; padding: 1rem 2rem; border-top: 1px solid var(--border); margin-top: 1rem; }
  .legenda-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .legenda-dot { width: 10px; height: 10px; border-radius: 2px; }

  /* ── SKELETON ── */
  .skel { background: linear-gradient(90deg, var(--bg3) 25%, var(--border2) 50%, var(--bg3) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 4px; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  .skel-title { height: 14px; width: 55%; }
  .skel-cat { height: 11px; width: 38%; }
  .skel-row { display: flex; gap: 8px; align-items: center; height: 32px; padding: 0 4px; border-bottom: 1px solid rgba(0,0,0,0.05); }
  .skel-row:last-child { border-bottom: none; }
  .skel-nr { width: 22px; height: 10px; flex-shrink: 0; }
  .skel-naam { flex: 1; height: 12px; }
  .skel-val { width: 36px; height: 10px; flex-shrink: 0; }
  .skel-beste { width: 50px; height: 13px; flex-shrink: 0; }

  /* ── POGING POPUP ── */
  .poging-popup {
    position: fixed;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 10px 14px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.14);
    z-index: 300;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    min-width: 170px;
    max-width: 240px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.1s;
  }
  .poging-popup.zichtbaar { opacity: 1; }
  .poging-popup-rij { display: flex; justify-content: space-between; gap: 12px; padding: 3px 0; border-bottom: 1px solid var(--border); }
  .poging-popup-rij:last-child { border-bottom: none; }
  .poging-popup-label { color: var(--muted); letter-spacing: 0.05em; font-size: 10px; text-transform: uppercase; white-space: nowrap; }
  .poging-popup-waarde { font-weight: 500; color: var(--text); text-align: right; }
  .poging-popup-laden { color: var(--muted); font-size: 11px; text-align: center; padding: 4px 0; }
  .td-afstand.heeft-link { cursor: pointer; }
  .td-afstand.heeft-link:hover { background: var(--accent-subtle); border-radius: 3px; }

  @media (max-width: 700px) {
    header { padding: 8px 1rem; height: auto; flex-wrap: wrap; gap: 8px; }
    .header-controls { width: 100%; flex-wrap: wrap; }
    .wedstrijd-wrap { max-width: 100%; flex: 1 1 100%; }
    main { padding: 1rem; }
    .ronde-tabs { padding: 0 1rem; }
    .wedstrijd-title { padding: 8px 1rem; }
    .legenda { padding: 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Fierljep<span>.</span>live</div>

  <nav class="header-nav">
    <div class="nav-sep"></div>
    <a href="/" class="nav-link nav-active">Wedstrijden</a>
    <a href="/klassement.html" class="nav-link">Klassement</a>
  </nav>

  <div class="live-pill"><span class="live-dot"></span>LIVE</div>

  <div class="header-controls">
    <div class="bond-wrap">
      <select class="bond-select" id="bond-select">
        <option value="3">PBH</option>
        <option value="2">FLB</option>
        <option value="1">Nat.</option>
      </select>
      <span class="select-arrow">▾</span>
    </div>

    <div class="datum-wrap">
      <input type="date" class="datum-input" id="datum-input">
    </div>

    <div class="wedstrijd-wrap">
      <select class="wedstrijd-select" id="wedstrijd-select" disabled>
        <option value="">— kies datum —</option>
      </select>
      <span class="select-arrow">▾</span>
    </div>

    <div class="update-time" id="update-time">—</div>
  </div>
</header>

<div id="sticky-bar">
  <div class="wedstrijd-title" id="wedstrijd-title">
    <img class="club-logo hidden" id="club-logo" src="" alt="">
    <span class="wedstrijd-titel-tekst" id="wedstrijd-titel-tekst"></span>
  </div>
  <div class="ronde-tabs" id="ronde-tabs" style="display:none;"></div>
</div>

<main id="main">
  <div class="state-box">
    <div class="icon">🏅</div>
    <p>Kalender wordt geladen…</p>
  </div>
</main>

<div class="legenda">
  <div class="legenda-item"><span class="naam-badge nr" style="margin:0;">NR</span>Nederlands/Hollands/Fries record</div>
  <div class="legenda-item"><span class="naam-badge tr" style="margin:0;">TR</span>Schansrecord</div>
  <div class="legenda-item"><span class="naam-badge pr" style="margin:0;">PR</span>Persoonlijk record</div>
  <div class="legenda-item"><span class="naam-badge sr" style="margin:0;">SR</span>Seizoensrecord</div>
  <div class="legenda-item"><span class="legenda-dot" style="background:var(--accent);opacity:0.5;"></span>Beste poging</div>
  <div class="legenda-item"><span class="legenda-dot" style="background:var(--nat)"></span>nat / afg. / b.s.</div>
</div>

<script>
const POLL_INTERVAL = 60000;

let pollTimer = null;
let actieveRonde = null;
let actieveWedstrijdId = null;
let rondenData = {};
let recordsData = [];
let officialsData = '';
let alleWedstrijden = [];
let actieveIdOrg = '3';
let geladenJaar = null;
let uitslagModus = false;

// ─── DATUM HULPFUNCTIES ───────────────────────────────────────────────────────

function vandaagISO() {
  return new Date().toISOString().slice(0, 10);
}

function parseNaarISO(str) {
  // "za 30-05-2026 ..." of "30-05-2026" → "2026-05-30"
  const m = str.match(/(\d{2})-(\d{2})-(\d{4})/);
  return m ? `${m[3]}-${m[2]}-${m[1]}` : null;
}

// ─── KALENDER LADEN ───────────────────────────────────────────────────────────

async function laadKalender(id_org = '2', jaar = null) {
  if (!jaar) jaar = vandaagISO().slice(0, 4);
  actieveIdOrg = id_org;
  geladenJaar = jaar;

  try {
    const qs = `id_org=${id_org}&jaar=${jaar}`;
    const [kalRes, uitRes] = await Promise.all([
      fetch(`/.netlify/functions/kalender?pagina=kalender&${qs}`),
      fetch(`/.netlify/functions/kalender?pagina=uitslagen&${qs}`),
    ]);
    const [kalenderHtml, uitslagenHtml] = await Promise.all([
      kalRes.text(),
      uitRes.text(),
    ]);
    const wedstrijden = [];
    const gezienIds = new Set();

    // Kalender (komende + recente)
    const kalDoc = new DOMParser().parseFromString(kalenderHtml, 'text/html');
    kalDoc.querySelectorAll('table tr').forEach(tr => {
      const link = tr.querySelector('a[href*="id_wedstrijd"]');
      if (!link) return;
      const match = link.getAttribute('href').match(/id_wedstrijd=(\d+)/);
      if (!match) return;
      const cellen = tr.querySelectorAll('td');
      if (cellen.length < 4) return;
      let datumRaw = '';
      let plaats = '';
      cellen.forEach(td => {
        const t = td.textContent.trim();
        if (!datumRaw && /\d{2}-\d{2}-\d{4}/.test(t)) datumRaw = t;
      });
      const linkTd = link.closest('td');
      const tds = [...cellen];
      const linkIdx = tds.indexOf(linkTd);
      if (linkIdx > 0) plaats = tds[linkIdx - 1].textContent.trim();
      const datum = parseNaarISO(datumRaw);
      if (!datum) return;
      if (gezienIds.has(match[1])) return;
      gezienIds.add(match[1]);
      wedstrijden.push({ id: match[1], naam: link.textContent.trim(), datum, plaats });
    });

    // Uitslagen (gespeeld)
    const uitDoc = new DOMParser().parseFromString(uitslagenHtml, 'text/html');
    uitDoc.querySelectorAll('table').forEach(tabel => {
      tabel.querySelectorAll('tr').forEach(tr => {
        const link = tr.querySelector('a[href*="id_wedstrijd"]');
        if (!link) return;
        const match = link.getAttribute('href').match(/id_wedstrijd=(\d+)/);
        if (!match || gezienIds.has(match[1])) return;
        const cellen = [...tr.querySelectorAll('td')];
        let datumRaw = '';
        let plaats = '';
        const naam = link.closest('td')?.querySelector('a')?.textContent.trim() || link.textContent.trim();
        cellen.forEach(td => {
          const t = td.textContent.trim();
          if (!datumRaw && /\d{2}-\d{2}-\d{4}/.test(t)) datumRaw = t;
        });
        const datumIdx = cellen.findIndex(td => /\d{2}-\d{2}-\d{4}/.test(td.textContent.trim()));
        if (datumIdx !== -1 && cellen[datumIdx + 1]) {
          plaats = cellen[datumIdx + 1].textContent.trim();
        }
        const datum = parseNaarISO(datumRaw);
        if (!datum) return;
        gezienIds.add(match[1]);
        wedstrijden.push({ id: match[1], naam, datum, plaats });
      });
    });

    alleWedstrijden = wedstrijden;
    initialiseerDatumPicker();
  } catch (e) {
    document.getElementById('main').innerHTML =
      `<div class="state-box"><div class="icon">⚠️</div><p>Kon kalender niet laden: ${e.message}</p></div>`;
  }
}

// ─── DATUM PICKER ─────────────────────────────────────────────────────────────

function initialiseerDatumPicker() {
  const datumInput = document.getElementById('datum-input');
  const params = new URLSearchParams(window.location.search);
  const urlDatum = params.get('datum');
  const urlId    = params.get('id');

  // Datum uit URL, anders vandaag of dichtstbijzijnde wedstrijd
  const vandaag = vandaagISO();
  if (urlDatum) {
    datumInput.value = urlDatum;
  } else {
    datumInput.value = vindDichtstbijzijndeDatum(vandaag) || vandaag;
  }

  vulWedstrijdSelector(datumInput.value, urlId);

  datumInput.addEventListener('change', () => {
    const gekozenJaar = datumInput.value.slice(0, 4);
    if (gekozenJaar !== geladenJaar) {
      laadKalender(actieveIdOrg, gekozenJaar).then(() => {
        vulWedstrijdSelector(datumInput.value, null);
      });
    } else {
      vulWedstrijdSelector(datumInput.value, null);
    }
  });
}

function vindDichtstbijzijndeDatum(vandaag) {
  const datums = [...new Set(alleWedstrijden.map(w => w.datum))].sort();
  if (!datums.length) return null;
  // Zoek exacte match of de eerste dag na vandaag
  const exact = datums.find(d => d === vandaag);
  if (exact) return exact;
  const toekomst = datums.find(d => d >= vandaag);
  if (toekomst) return toekomst;
  // Geen toekomstige: pak de meest recente
  return datums[datums.length - 1];
}

function zetURL(datum, id) {
  const params = new URLSearchParams();
  if (actieveIdOrg && actieveIdOrg !== '2') params.set('id_org', actieveIdOrg);
  if (datum) params.set('datum', datum);
  if (id)    params.set('id', id);
  history.replaceState(null, '', '?' + params.toString());
}

function vulWedstrijdSelector(datum, voorkeurId) {
  const select = document.getElementById('wedstrijd-select');
  const wedstrijdenOpDatum = alleWedstrijden.filter(w => w.datum === datum);

  select.innerHTML = '';
  clearInterval(pollTimer);
  actieveRonde = null;

  if (wedstrijdenOpDatum.length === 0) {
    select.innerHTML = '<option value="">Geen PBH-wedstrijden op deze datum</option>';
    select.disabled = true;
    document.getElementById('main').innerHTML =
      `<div class="state-box"><div class="icon">📅</div><p>Geen PBH-wedstrijden gevonden op ${datum.split('-').reverse().join('-')}.</p></div>`;
    document.getElementById('wedstrijd-title').style.display = 'none';
    document.getElementById('ronde-tabs').style.display = 'none';
    zetURL(datum, null);
    return;
  }

  select.disabled = false;

  if (wedstrijdenOpDatum.length === 1) {
    const w = wedstrijdenOpDatum[0];
    select.innerHTML = `<option value="${w.id}">${w.naam} — ${w.plaats}</option>`;
    zetURL(datum, w.id);
    laadWedstrijd(w.id);
  } else {
    select.innerHTML = '<option value="">Kies een wedstrijd…</option>';
    wedstrijdenOpDatum.forEach(w => {
      const opt = document.createElement('option');
      opt.value = w.id;
      opt.textContent = `${w.naam} — ${w.plaats}`;
      select.appendChild(opt);
    });
    // Herstel voorkeur-id uit URL als die op deze datum bestaat
    const geldig = wedstrijdenOpDatum.find(w => w.id === voorkeurId);
    if (geldig) {
      select.value = geldig.id;
      zetURL(datum, geldig.id);
      laadWedstrijd(geldig.id);
    } else {
      document.getElementById('main').innerHTML =
        `<div class="state-box"><div class="icon">👆</div><p>Kies een wedstrijd uit de lijst.</p></div>`;
      document.getElementById('wedstrijd-title').style.display = 'none';
      document.getElementById('ronde-tabs').style.display = 'none';
      zetURL(datum, null);
    }
  }

  select.onchange = () => {
    if (select.value) {
      zetURL(datum, select.value);
      laadWedstrijd(select.value);
    }
  };
}

const CLUB_THEMAS = {
  jaarsveld:      { accent: '#f5c800', accent2: '#d4a800', accentText: '#1a1a1a', accentSubtle: 'rgba(245,200,0,0.10)' },
  vlist:          { accent: '#2d7d3a', accent2: '#1f5e2a', accentText: '#ffffff', accentSubtle: 'rgba(45,125,58,0.10)' },
  linschoten:     { accent: '#cc1f1f', accent2: '#a81515', accentText: '#ffffff', accentSubtle: 'rgba(204,31,31,0.10)' },
  polsbroekerdam: { accent: '#1a5fa8', accent2: '#134a87', accentText: '#ffffff', accentSubtle: 'rgba(26,95,168,0.10)' },
  zegveld:        { accent: '#e07020', accent2: '#c05a10', accentText: '#ffffff', accentSubtle: 'rgba(224,112,32,0.10)' },
  stichtse_vecht: { accent: '#2aace2', accent2: '#1a8ec0', accentText: '#ffffff', accentSubtle: 'rgba(42,172,226,0.10)' },
};

const SLUG_ALIAS = { kockengen: 'stichtse_vecht' };

const STANDAARD_THEMA = { accent: '#1d6ef5', accent2: '#1558d0', accentText: '#ffffff', accentSubtle: 'rgba(29,110,245,0.08)' };

function pasThemaToe(plaats) {
  const raw = plaats.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z_]/g,'');
  const slug = SLUG_ALIAS[raw] ?? raw;
  const thema = CLUB_THEMAS[slug] || STANDAARD_THEMA;
  const root = document.documentElement;
  root.style.setProperty('--accent',        thema.accent);
  root.style.setProperty('--accent2',       thema.accent2);
  root.style.setProperty('--accent-text',   thema.accentText);
  root.style.setProperty('--accent-subtle', thema.accentSubtle);
}

// ─── CLUB LOGO ────────────────────────────────────────────────────────────────

function toonClubLogo(plaats) {
  const img = document.getElementById('club-logo');
  const raw = plaats.toLowerCase().replace(/\s+/g, '_').replace(/[^a-z_]/g, '');
  const clubSlug = SLUG_ALIAS[raw] ?? raw;
  img.src = `/.netlify/functions/logo?club=${clubSlug}`;
  img.alt = plaats;
  img.classList.remove('hidden');
  img.onerror = () => img.classList.add('hidden');
}

// ─── WEDSTRIJD LADEN ──────────────────────────────────────────────────────────

function isLive(wedstrijd) {
  if (!wedstrijd) return false;
  // Live als de wedstrijddatum vandaag of in de toekomst is
  return wedstrijd.datum >= vandaagISO();
}

function laadWedstrijd(id) {
  clearInterval(pollTimer);
  actieveRonde = null;
  actieveWedstrijdId = id;
  const wedstrijd = alleWedstrijden.find(w => w.id === id);
  if (wedstrijd) {
    pasThemaToe(wedstrijd.plaats);
    toonClubLogo(wedstrijd.plaats);
  }
  toonLaden();
  fetchEnRender(id);
  if (isLive(wedstrijd)) {
    pollTimer = setInterval(() => fetchEnRender(id), POLL_INTERVAL);
    document.querySelector('.live-pill').style.display = 'flex';
  } else {
    document.querySelector('.live-pill').style.display = 'none';
  }
}

async function fetchEnRender(id) {
  try {
    const res = await fetch(`/.netlify/functions/proxy?id_wedstrijd=${id}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const html = await res.text();
    parseEnRender(html);
    document.getElementById('update-time').textContent =
      'bijgewerkt ' + new Date().toLocaleTimeString('nl-NL', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  } catch (err) {
    toonFout(err.message);
  }
}

function parseEnRender(html) {
  officialsData = '';
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const titelEl = doc.querySelector('table td[colspan="3"] center');
  if (titelEl) {
    // Split op <br>: eerste deel = wedstrijdnaam, rest = officials
    const regels = titelEl.innerHTML.split(/<br\s*\/?>/i).map(r => r.replace(/<[^>]+>/g, '').trim()).filter(Boolean);
    document.getElementById('wedstrijd-titel-tekst').textContent = regels[0] || '';
    document.getElementById('wedstrijd-title').style.display = 'flex';
    // Officials: alles na eerste regel, telefoonnummers verwijderen
    officialsData = regels.slice(1).join(' ')
      .replace(/\(\s*[\d\-]+\s*\)/g, '')   // (06-12345678)
      .trim();
  }
  const hoofdtabel = doc.querySelector('table[width="100%"][border="1"]');
  if (!hoofdtabel) { toonFout('Kon wedstrijddata niet lezen.'); return; }
  rondenData = {};
  let huidigeRonde = null;
  hoofdtabel.querySelectorAll('tr').forEach(row => {
    const rondeCell = row.querySelector('td[colspan="3"][align="center"], td[colspan="2"][align="center"]');
    if (rondeCell) {
      huidigeRonde = rondeCell.textContent.trim();
      if (!rondenData[huidigeRonde]) rondenData[huidigeRonde] = [];
      return;
    }
    const schansCellen = row.querySelectorAll('td[valign="top"]');
    if (schansCellen.length > 0 && huidigeRonde) {
      const schansen = [];
      schansCellen.forEach(cel => {
        const d = parseSchans(cel);
        if (d.length > 0) schansen.push(d);
      });
      if (schansen.length > 0) rondenData[huidigeRonde] = schansen;
    }
  });
  // Parse records tabel (onderaan de pagina)
  recordsData = [];
  doc.querySelectorAll('tr.pbh_data_kopregel').forEach(row => {
    const tekst = row.textContent.trim();
    if (!tekst) return;
    // Formaat: "Schansrecords: Senioren: 21.56 meter - Dames: ..."
    const colonIdx = tekst.indexOf(':');
    if (colonIdx === -1) return;
    const label = tekst.slice(0, colonIdx).trim();
    const waarden = tekst.slice(colonIdx + 1).trim();
    // Split op " - " en parse per categorie
    const items = waarden.split(' - ').map(s => {
      const parts = s.split(':');
      if (parts.length < 2) return null;
      return { cat: parts[0].trim(), waarde: parts.slice(1).join(':').trim() };
    }).filter(Boolean);
    recordsData.push({ label, items });
  });

  const cacheKey = `ronde_${actieveWedstrijdId}`;
  const gecachteRonde = sessionStorage.getItem(cacheKey);
  if (!actieveRonde || !rondenData[actieveRonde]) {
    actieveRonde = (gecachteRonde && (rondenData[gecachteRonde] || gecachteRonde === '__records__' || gecachteRonde === '__officials__')) ? gecachteRonde : Object.keys(rondenData)[0];
  }
  bouwRondeTabs();
  if (actieveRonde === '__records__') renderRecords();
  else if (actieveRonde === '__officials__') renderOfficials();
  else renderRonde(actieveRonde);
}

function parseSchans(cel) {
  const categorieen = [];
  cel.querySelectorAll('table').forEach(tabel => {
    const catHeader = tabel.querySelector('td[bgcolor="FAFAD2"] font[color="blue"]');
    if (!catHeader) return;
    const springers = [];
    // Lees kolomheaders om voorronde-kolom te detecteren
    const headerRij = tabel.querySelector('tr[bgcolor="FAFAD2"]');
    const kolomHeaders = headerRij
      ? [...headerRij.querySelectorAll('td')].map(td => td.textContent.trim().toLowerCase())
      : [];
    // Kolommen starten na: Nr, (lege td), Naam, Pr. → index 4 in cellen
    // kolomHeaders[0..1] = Nr, Naam, kolomHeaders[2] = Pr, rest = afstanden + Pl
    // Zoek welke afstand-kolommen "voorronde" zijn (index relatief aan slice(4))
    const afstandHeaders = kolomHeaders.slice(3, -1); // skip Nr,naam,pr en Pl
    const dimIndices = new Set(
      afstandHeaders.map((h, i) => h.includes('voorronde') ? i : -1).filter(i => i >= 0)
    );

    tabel.querySelectorAll('tr.tekstklein[height]').forEach((rij) => {
      const cellen = rij.querySelectorAll('td');
      if (cellen.length < 4) return;
      const rugnr = cellen[0].textContent.trim();
      const naamEl = rij.querySelector('a[class="LINKPBH"]') || rij.querySelector('a');
      const naamRaw = naamEl ? naamEl.textContent.replace(/\(F\s*\d+\)/g,'').replace(/\s+/g,' ').trim() : '';
      // Extraheer verenigingsafkorting uit superscript (bijv. " PD", " VL")
      const supEl = naamEl ? naamEl.querySelector('sup small small') : null;
      const vereniging = supEl ? supEl.textContent.trim() : '';
      const naam = naamRaw.replace(vereniging, '').trim();
      const isItalic = !!rij.querySelector('i');
      const afstanden = [...cellen].slice(4).map((c, i) => {
        const tekst = c.textContent.trim();
        const bg = (c.getAttribute('bgcolor') || '').toUpperCase();
        let type = 'normaal';
        if (bg === 'YELLOW') type = 'season';
        if (bg === '#FF6600' || bg === 'FF6600') type = 'pr';
        if (bg === '#C2F0C2') type = 'tr';
        if (bg === '#1DB2F2') type = 'nr';
        if (['nat','afg.','b.s.'].includes(tekst)) type = 'misslukt';
        if (!tekst || tekst === '\u00a0') type = 'leeg';
        const dim = dimIndices.has(i);
        const linkEl = c.querySelector('a[href]');
        const href = linkEl ? linkEl.getAttribute('href') : null;
        return { tekst, type, dim, href };
      });
      let besteIdx = -1, besteWaarde = -1;
      afstanden.forEach((a, i) => {
        if (i === afstanden.length - 1) return;
        const v = parseFloat(a.tekst);
        if (!isNaN(v) && v > besteWaarde) { besteWaarde = v; besteIdx = i; }
      });
      springers.push({ nr: rugnr, naam, vereniging, isItalic, pogingen: afstanden.slice(0,-1), besteIdx, beste: besteWaarde > 0 ? besteWaarde.toFixed(2) : null, plaats: cellen[cellen.length-1].textContent.trim() });
    });
    if (springers.length > 0) {
      const naam = catHeader.textContent.trim();
      // Detecteer groepsnaam: "Senioren Topklasse groep 1" → basisNaam="Senioren Topklasse", groepNr=1
      const groepMatch = naam.match(/^(.+?)\s+groep\s+(\d+)$/i);
      categorieen.push({
        naam,
        basisNaam: groepMatch ? groepMatch[1].trim() : naam,
        groepNr: groepMatch ? parseInt(groepMatch[2]) : null,
        springers,
      });
    }
  });

  // Koppel groepen aan elkaar zodat stand doorloopt, maar groepen blijven apart
  // Groepeer per basisNaam
  const groepMap = {};
  categorieen.forEach(cat => {
    if (cat.groepNr !== null) {
      if (!groepMap[cat.basisNaam]) groepMap[cat.basisNaam] = [];
      groepMap[cat.basisNaam].push(cat);
    }
  });

  // Bereken gecombineerde stand per basisNaam (gesorteerd op beste afstand)
  Object.values(groepMap).forEach(groepen => {
    // Alle springers van alle groepen samen, rang bepalen
    const alle = groepen.flatMap(g => g.springers);
    alle.sort((a, b) => (parseFloat(b.beste) || 0) - (parseFloat(a.beste) || 0));
    // Ken stand toe per springer op basis van gecombineerde ranking
    const standMap = {};
    alle.forEach((s, i) => { standMap[s.nr + s.naam] = String(i + 1); });
    // Schrijf stand terug per groep (springvolgorde blijft intact)
    groepen.forEach(g => {
      g.springers.forEach(s => { s.plaats = standMap[s.nr + s.naam] ?? s.plaats; });
    });
  });

  return categorieen;
}

function bouwRondeTabs() {
  const tabsEl = document.getElementById('ronde-tabs');
  tabsEl.innerHTML = '';
  tabsEl.style.display = 'flex';
  Object.keys(rondenData).forEach(ronde => {
    const btn = document.createElement('button');
    btn.className = 'ronde-tab' + (ronde === actieveRonde ? ' active' : '');
    btn.textContent = ronde;
    btn.onclick = () => {
      actieveRonde = ronde;
      sessionStorage.setItem(`ronde_${actieveWedstrijdId}`, ronde);
      document.querySelectorAll('.ronde-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderRonde(ronde);
    };
    tabsEl.appendChild(btn);
  });

  // Records tab
  if (recordsData.length > 0) {
    const btn = document.createElement('button');
    btn.className = 'ronde-tab' + (actieveRonde === '__records__' ? ' active' : '');
    btn.textContent = 'Records';
    btn.onclick = () => {
      actieveRonde = '__records__';
      sessionStorage.setItem(`ronde_${actieveWedstrijdId}`, '__records__');
      document.querySelectorAll('.ronde-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderRecords();
    };
    tabsEl.appendChild(btn);
  }

  // Officials tab
  if (officialsData) {
    const btn = document.createElement('button');
    btn.className = 'ronde-tab' + (actieveRonde === '__officials__' ? ' active' : '');
    btn.textContent = 'Officials';
    btn.onclick = () => {
      actieveRonde = '__officials__';
      sessionStorage.setItem(`ronde_${actieveWedstrijdId}`, '__officials__');
      document.querySelectorAll('.ronde-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderOfficials();
    };
    tabsEl.appendChild(btn);
  }

  // Pogingen toggle
  const isAan = !document.body.classList.contains('hide-pogingen');
  const toggle = document.createElement('button');
  toggle.id = 'toggle-pogingen';
  toggle.className = 'toggle-pogingen' + (isAan ? ' actief' : '');
  toggle.innerHTML = `<span class="toggle-dot"></span>Pogingen`;
  toggle.addEventListener('click', () => {
    const verberg = document.body.classList.toggle('hide-pogingen');
    toggle.classList.toggle('actief', !verberg);
  });
  tabsEl.appendChild(toggle);

  // Uitslag toggle
  const toggleUitslag = document.createElement('button');
  toggleUitslag.className = 'toggle-pogingen' + (uitslagModus ? ' actief' : '');
  toggleUitslag.innerHTML = `<span class="toggle-dot"></span>Uitslag`;
  toggleUitslag.addEventListener('click', () => {
    uitslagModus = !uitslagModus;
    toggleUitslag.classList.toggle('actief', uitslagModus);
    if (actieveRonde && actieveRonde !== '__records__' && actieveRonde !== '__officials__') {
      renderRonde(actieveRonde);
    }
  });
  tabsEl.appendChild(toggleUitslag);
}

function renderRecords() {
  const main = document.getElementById('main');

  // Skip Legenda row (last item)
  const rijen = recordsData.filter(r => !r.label.toLowerCase().includes('legenda'));

  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;flex-direction:column;gap:16px;max-width:800px;';

  rijen.forEach(rij => {
    const card = document.createElement('div');
    card.className = 'schans-card';
    card.innerHTML = `<div class="schans-header"><span class="schans-title">${rij.label}</span></div>`;

    const tabel = document.createElement('table');
    tabel.className = 'springer-table';
    tabel.style.cssText = 'margin:0;';
    tabel.innerHTML = `<thead><tr>
      <th class="left">Categorie</th>
      <th>Afstand</th>
    </tr></thead>`;
    const tbody = document.createElement('tbody');

    rij.items.forEach(item => {
      const tr = document.createElement('tr');
      // Highlight if it contains "meter" with a meaningful value
      const match = item.waarde.match(/([\d.]+)\s*meter/);
      const waarde = match ? match[1] + ' m' : item.waarde;
      const isNul = waarde.startsWith('0.00');
      tr.innerHTML = `
        <td style="color:var(--text);font-size:13px;">${item.cat}</td>
        <td style="text-align:center;font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:${isNul ? 'var(--muted)' : 'var(--accent)'};">${isNul ? '—' : waarde}</td>`;
      tbody.appendChild(tr);
    });

    tabel.appendChild(tbody);
    const block = document.createElement('div');
    block.className = 'categorie-block';
    block.appendChild(tabel);
    card.appendChild(block);
    wrap.appendChild(card);
  });

  main.innerHTML = '';
  main.appendChild(wrap);
}

function renderOfficials() {
  const main = document.getElementById('main');
  // Splits op sleutelwoorden als "Wedstrijdleider" / "Commentator" / "Jurylid" etc.
  const items = officialsData
    .split(/(?=(?:Wedstrijdleid(?:er|ing)|Commentator|Jurylid(?:en)?|Scheidsrechter|Tijdwaarnemer|Official)\s)/i)
    .map(s => s.trim()).filter(Boolean);

  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;flex-direction:column;gap:8px;max-width:480px;';

  items.forEach(item => {
    const colonIdx = item.indexOf(':');
    const label = colonIdx !== -1 ? item.slice(0, colonIdx).trim() : item;
    const waarde = colonIdx !== -1 ? item.slice(colonIdx + 1).trim() : '';
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;gap:12px;align-items:baseline;padding:8px 0;border-bottom:1px solid var(--border);';
    row.innerHTML = `
      <span style="font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);min-width:160px;flex-shrink:0;">${label}</span>
      <span style="font-size:14px;font-weight:500;">${waarde}</span>`;
    wrap.appendChild(row);
  });

  main.innerHTML = '';
  main.appendChild(wrap);
}

function samenvoegGroepen(cats) {
  const merged = [];
  const gezien = new Map();
  cats.forEach(cat => {
    if (cat.groepNr !== null) {
      if (!gezien.has(cat.basisNaam)) {
        const samengevoegd = { ...cat, naam: cat.basisNaam, groepNr: null, springers: [...cat.springers] };
        gezien.set(cat.basisNaam, samengevoegd);
        merged.push(samengevoegd);
      } else {
        gezien.get(cat.basisNaam).springers.push(...cat.springers);
      }
    } else {
      merged.push(cat);
    }
  });
  return merged;
}

function renderRonde(ronde) {
  const main = document.getElementById('main');
  const schansen = rondenData[ronde];
  if (!schansen?.length) { main.innerHTML = '<div class="state-box"><p>Geen data voor deze ronde.</p></div>'; return; }

  const grid = document.createElement('div');
  grid.className = 'schansen-grid';

  schansen.forEach((cats, si) => {
    const catNamen = cats.map(c => c.basisNaam.toLowerCase());
    const schansLetter = catNamen.some(n => n.includes('senior')) ? 'A'
      : catNamen.some(n => n.includes('junior') || /\bjongens\s+a\b/.test(n)) ? 'B'
      : catNamen.some(n => n.includes('meisje') || n.includes('dames')) ? 'C'
      : String(si + 1);
    const card = document.createElement('div');
    card.className = 'schans-card';
    card.innerHTML = `<div class="schans-header"><span class="schans-title">Schans ${schansLetter}</span></div>`;

    const weergaveCats = uitslagModus ? samenvoegGroepen(cats) : cats;
    weergaveCats.forEach(cat => {
      const block = document.createElement('div');
      block.className = 'categorie-block';
      const beste = cat.springers.reduce((b,s) => { const v=parseFloat(s.beste); return (!isNaN(v)&&v>b.v)?{v}:b; }, {v:-1});
      const n = cat.springers[0]?.pogingen.length || 3;
      // Genereer kolomlabels; dim-pogingen krijgen label "Vr."
      const labels = Array.from({length:n},(_,i) => {
        const p = cat.springers[0]?.pogingen[i];
        if (p?.dim) return 'Vr.';
        if (n === 2) return `F${i+1}`;
        return `P${i+1}`;
      });
      const groepSuffix = cat.groepNr !== null
        ? ` <span style="font-size:10px;font-weight:400;color:var(--muted);font-family:'DM Mono',monospace;">groep ${cat.groepNr}</span>`
        : '';
      block.innerHTML = `
        <div class="cat-header">
          <span class="cat-label">${cat.basisNaam}${groepSuffix}</span>
          ${beste.v>0?`<span class="cat-best">Beste: <strong>${beste.v.toFixed(2)} m</strong></span>`:''}
        </div>
        <div class="table-scroll"><table class="springer-table">
          <thead><tr>
            <th class="left" style="width:30px">Nr.</th>
            <th class="left">Naam</th>
            <th style="border-right:1px solid var(--border2);">Beste</th>
            ${labels.map((l,li) => {
              const cls = l==='Vr.'?'dim-header':'';
              return `<th${cls?' class="'+cls+'"':''}>${l}</th>`;
            }).join('')}
            <th>St.</th>
          </tr></thead>
          <tbody></tbody>
        </table></div>`;
      const tbody = block.querySelector('tbody');
      const springers = uitslagModus
        ? [...cat.springers].sort((a, b) => {
            const aGeldig = a.beste !== null, bGeldig = b.beste !== null;
            if (!aGeldig && !bGeldig) return 0;
            if (!aGeldig) return 1;
            if (!bGeldig) return -1;
            const pa = parseInt(a.plaats), pb = parseInt(b.plaats);
            if (isNaN(pa) && isNaN(pb)) return 0;
            if (isNaN(pa)) return 1;
            if (isNaN(pb)) return -1;
            return pa - pb;
          })
        : cat.springers;
      springers.forEach(s => {
        const tr = document.createElement('tr');
        const isAfwezig = s.pogingen.filter(p => !p.dim).every(p => p.tekst === 'afg.');
        const heeftNR = !isAfwezig && s.pogingen.some(p => p.type === 'nr');
        const heeftTR = !isAfwezig && !heeftNR && s.pogingen.some(p => p.type === 'tr');
        const heeftPR = !isAfwezig && !heeftNR && !heeftTR && s.pogingen.some(p => p.type === 'pr');
        const heeftSR = !isAfwezig && !heeftNR && !heeftTR && !heeftPR && s.pogingen.some(p => p.type === 'season');
        const badge = heeftNR ? '<span class="naam-badge nr">NR</span>'
          : heeftTR ? '<span class="naam-badge tr">TR</span>'
          : heeftPR ? '<span class="naam-badge pr">PR</span>'
          : heeftSR ? '<span class="naam-badge sr">SR</span>' : '';
        const pogs = s.pogingen.map((p,pi) => {
          let cls='td-afstand';
          if (p.dim) cls+=' is-dim';
          else if (pi===s.besteIdx) cls+=' best';
          if (p.type==='misslukt') cls+= isAfwezig ? ' is-afwezig' : ' is-nat';
          else if (p.type==='leeg') cls+=' is-empty';
          const heeftHref = p.href && p.type !== 'leeg';
          if (heeftHref) cls+=' heeft-link';
          const tekst = p.type==='leeg' ? '—' : p.tekst==='nat' ? '💧' : p.tekst;
          const dataAttr = heeftHref ? ` data-href="${p.href}"` : '';
          return `<td class="${cls}"${dataAttr}>${tekst}</td>`;
        }).join('');
        const besteTekst = s.beste ? s.beste + ' m' : '—';
        const besteCls = 'td-beste' + (s.beste ? '' : ' leeg');
        const pl = s.beste ? parseInt(s.plaats) : NaN;
        const stand=!isNaN(pl)?(pl<=3?`<span class="stand-badge stand-${pl}">${pl}</span>`:`<span class="stand-other">${pl}</span>`):`<span class="stand-other">—</span>`;
        if (isAfwezig) tr.classList.add('tr-afwezig');
        tr.innerHTML=`<td class="td-nr">${s.nr}</td><td class="td-naam${s.isItalic?' italic':''}" title="${s.naam}"><div class="naam-inner"><div class="naam-links"><span class="naam-tekst">${s.naam}</span>${s.vereniging?`<span class="naam-club">${s.vereniging}</span>`:''}</div>${badge}</div></td><td class="${besteCls}">${besteTekst}</td>${pogs}<td class="td-stand">${stand}</td>`;
        tbody.appendChild(tr);
      });
      card.appendChild(block);
    });

    grid.appendChild(card);
  });

  main.innerHTML = '';
  main.appendChild(grid);
}

function toonLaden() {
  const grid = document.createElement('div');
  grid.className = 'schansen-grid';
  const pogWidths = [36, 30, 36];
  for (let i = 0; i < 3; i++) {
    const naamWidths = [70, 85, 60, 75, 90, 65];
    const card = document.createElement('div');
    card.className = 'schans-card';
    card.innerHTML = `
      <div class="schans-header" style="display:flex;align-items:center;height:38px;padding:10px 14px;">
        <div class="skel skel-title"></div>
      </div>
      <div class="categorie-block">
        <div class="cat-header" style="margin-bottom:10px;">
          <div class="skel skel-cat"></div>
        </div>
        ${naamWidths.map(w => `
          <div class="skel-row">
            <div class="skel skel-nr"></div>
            <div class="skel skel-naam" style="max-width:${w}%;"></div>
            ${pogWidths.map(() => `<div class="skel skel-val"></div>`).join('')}
            <div class="skel skel-beste"></div>
          </div>`).join('')}
      </div>`;
    grid.appendChild(card);
  }
  const main = document.getElementById('main');
  main.innerHTML = '';
  main.appendChild(grid);
}

function toonFout(msg) {
  document.getElementById('main').innerHTML =
    `<div class="state-box"><div class="icon">⚠️</div><p>Kon data niet laden: ${msg}</p></div>`;
}

// ─── INIT ─────────────────────────────────────────────────────────────────────

const _initParams = new URLSearchParams(window.location.search);
const _initIdOrg  = _initParams.get('id_org') || '3';
const _initJaar   = (_initParams.get('datum') || vandaagISO()).slice(0, 4);

document.getElementById('bond-select').value = _initIdOrg;
document.getElementById('bond-select').addEventListener('change', (e) => {
  const jaar = document.getElementById('datum-input').value.slice(0, 4) || vandaagISO().slice(0, 4);
  laadKalender(e.target.value, jaar);
});

laadKalender(_initIdOrg, _initJaar);

// ─── POGING POPUP ─────────────────────────────────────────────────────────────

const pogingPopup = document.createElement('div');
pogingPopup.className = 'poging-popup';
document.body.appendChild(pogingPopup);

const pogingCache = {};

function sluitPopup() {
  pogingPopup.classList.remove('zichtbaar');
}

function toonPopup(el, href) {
  pogingPopup.innerHTML = '<div class="poging-popup-laden">Laden…</div>';
  positioneerPopup(el);
  pogingPopup.classList.add('zichtbaar');

  if (pogingCache[href]) {
    vulPopup(pogingCache[href]);
    return;
  }

  fetch(`/.netlify/functions/poging?url=${encodeURIComponent(href)}`)
    .then(r => r.text())
    .then(html => {
      const data = parsePogingDetail(html);
      pogingCache[href] = data;
      vulPopup(data);
    })
    .catch(() => {
      pogingCache[href] = null;
      vulPopup(null);
    });
}

function positioneerPopup(el) {
  const rect = el.getBoundingClientRect();
  const popH = 90;
  const popW = 200;
  let top = rect.bottom + 6;
  let left = rect.left + rect.width / 2 - popW / 2;
  if (top + popH > window.innerHeight) top = rect.top - popH - 6;
  if (left < 8) left = 8;
  if (left + popW > window.innerWidth - 8) left = window.innerWidth - popW - 8;
  pogingPopup.style.top = top + 'px';
  pogingPopup.style.left = left + 'px';
}

function vulPopup(data) {
  if (!data) {
    pogingPopup.innerHTML = '<div class="poging-popup-laden">Geen details beschikbaar</div>';
    return;
  }
  const rijen = [
    data.landingsplaats ? { label: 'Landingsplaats', waarde: data.landingsplaats } : null,
    data.afwijking      ? { label: 'Afwijking',      waarde: data.afwijking }      : null,
  ].filter(Boolean);

  if (!rijen.length) {
    pogingPopup.innerHTML = '<div class="poging-popup-laden">Geen details beschikbaar</div>';
    return;
  }
  pogingPopup.innerHTML = rijen.map(r =>
    `<div class="poging-popup-rij">
      <span class="poging-popup-label">${r.label}</span>
      <span class="poging-popup-waarde">${r.waarde}</span>
    </div>`
  ).join('');
}

function parsePogingDetail(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const data = {};
  doc.querySelectorAll('th').forEach(th => {
    const label = th.textContent.trim().toLowerCase();
    const waarde = th.nextElementSibling?.textContent.trim();
    if (!waarde) return;
    if (label === 'landingsplaats') data.landingsplaats = waarde + ' m';
    if (label === 'afwijking')      data.afwijking      = waarde + ' m';
  });
  return (data.landingsplaats || data.afwijking) ? data : null;
}

document.getElementById('main').addEventListener('click', e => {
  const td = e.target.closest('.td-afstand.heeft-link');
  if (td) {
    e.stopPropagation();
    toonPopup(td, td.dataset.href);
    return;
  }
  sluitPopup();
});

document.addEventListener('scroll', sluitPopup, { passive: true });
document.addEventListener('keydown', e => { if (e.key === 'Escape') sluitPopup(); });
</script>
