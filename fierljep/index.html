<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fierljep — Live Scorebord</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --bg2: #151820;
    --bg3: #1c2030;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8eaf0;
    --muted: #6b7280;
    --accent: #3b82f6;
    --accent2: #1d4ed8;
    --gold: #f59e0b;
    --silver: #94a3b8;
    --bronze: #b45309;
    --pr: #f97316;
    --season: #eab308;
    --nat: #ef4444;
    --live: #22c55e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border2);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: 0.05em;
    color: var(--text);
    text-transform: uppercase;
  }

  .logo span {
    color: var(--accent);
  }

  .live-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(34,197,94,0.12);
    border: 1px solid rgba(34,197,94,0.3);
    border-radius: 999px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 500;
    color: var(--live);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.08em;
  }

  .live-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--live);
    animation: pulse 1.4s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .wedstrijd-input {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .wedstrijd-input label {
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  .wedstrijd-input input {
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 5px 10px;
    width: 80px;
    outline: none;
    transition: border-color 0.15s;
  }

  .wedstrijd-input input:focus {
    border-color: var(--accent);
  }

  .btn-load {
    background: var(--accent);
    border: none;
    border-radius: 6px;
    color: white;
    cursor: pointer;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.05em;
    padding: 6px 14px;
    text-transform: uppercase;
    transition: background 0.15s;
  }

  .btn-load:hover { background: var(--accent2); }

  .update-time {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  /* WEDSTRIJD TITLE */
  .wedstrijd-title {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 10px 2rem;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    display: none;
  }

  /* RONDE TABS */
  .ronde-tabs {
    display: flex;
    gap: 0;
    padding: 0 2rem;
    background: var(--bg2);
    border-bottom: 1px solid var(--border2);
    overflow-x: auto;
  }

  .ronde-tab {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.06em;
    padding: 12px 18px;
    text-transform: uppercase;
    transition: color 0.15s, border-color 0.15s;
    white-space: nowrap;
  }

  .ronde-tab:hover { color: var(--text); }
  .ronde-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* MAIN */
  main {
    padding: 1.5rem 2rem;
  }

  /* SCHANSEN GRID */
  .schansen-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 16px;
  }

  /* SCHANS CARD */
  .schans-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .schans-header {
    background: var(--bg3);
    border-bottom: 1px solid var(--border2);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .schans-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text);
  }

  /* CATEGORIE */
  .categorie-block {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
  }

  .categorie-block:last-child { border-bottom: none; }

  .cat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .cat-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .cat-best {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .cat-best strong {
    color: var(--gold);
    font-weight: 500;
  }

  /* TABLE */
  .springer-table {
    width: 100%;
    border-collapse: collapse;
  }

  .springer-table thead tr {
    border-bottom: 1px solid var(--border);
  }

  .springer-table thead th {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: var(--muted);
    padding: 4px 4px 6px;
    text-align: center;
    text-transform: uppercase;
  }

  .springer-table thead th.left { text-align: left; }

  .springer-table tbody tr {
    border-bottom: 1px solid rgba(255,255,255,0.03);
    transition: background 0.1s;
  }

  .springer-table tbody tr:last-child { border-bottom: none; }
  .springer-table tbody tr:hover { background: rgba(255,255,255,0.02); }

  .springer-table td {
    padding: 6px 4px;
    font-size: 12px;
    vertical-align: middle;
  }

  /* Spring number */
  .td-nr {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    width: 22px;
  }

  /* Naam */
  .td-naam {
    max-width: 130px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 12px;
    color: var(--text);
  }

  .td-naam.italic { font-style: italic; }

  /* Afstanden */
  .td-afstand {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    text-align: center;
    width: 44px;
    color: var(--muted);
  }

  .td-afstand.best {
    color: var(--accent);
    font-weight: 500;
  }

  .td-afstand.is-pr { color: var(--pr); font-weight: 500; }
  .td-afstand.is-season { color: var(--season); font-weight: 500; }
  .td-afstand.is-nat { color: var(--nat); }
  .td-afstand.is-empty { color: rgba(255,255,255,0.15); }

  /* Stand badge */
  .td-stand { text-align: center; width: 28px; }

  .stand-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
  }

  .stand-1 { background: rgba(245,158,11,0.15); color: var(--gold); }
  .stand-2 { background: rgba(148,163,184,0.15); color: var(--silver); }
  .stand-3 { background: rgba(180,83,9,0.15); color: var(--bronze); }
  .stand-other { color: var(--muted); font-size: 10px; font-family: 'DM Mono', monospace; }

  /* STATE: loading/error/empty */
  .state-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 5rem 2rem;
    text-align: center;
    gap: 12px;
  }

  .state-box .icon {
    font-size: 32px;
    opacity: 0.3;
  }

  .state-box p {
    color: var(--muted);
    font-size: 14px;
    max-width: 360px;
    line-height: 1.6;
  }

  .spinner {
    width: 28px;
    height: 28px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* LEGENDA */
  .legenda {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    padding: 1rem 2rem;
    border-top: 1px solid var(--border);
    margin-top: 1rem;
  }

  .legenda-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  .legenda-dot {
    width: 10px;
    height: 10px;
    border-radius: 2px;
  }

  /* RESPONSIVE */
  @media (max-width: 640px) {
    header { padding: 0 1rem; flex-wrap: wrap; height: auto; gap: 8px; padding: 10px 1rem; }
    main { padding: 1rem; }
    .ronde-tabs { padding: 0 1rem; }
    .wedstrijd-title { padding: 8px 1rem; }
    .legenda { padding: 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">Fierljep<span>.</span>live</div>
    <div class="live-pill"><span class="live-dot"></span>LIVE</div>
  </div>
  <div class="header-right">
    <div class="wedstrijd-input">
      <label>ID</label>
      <input type="number" id="wedstrijd-id" value="5061" min="1">
    </div>
    <button class="btn-load" onclick="laadWedstrijd()">Laden</button>
    <div class="update-time" id="update-time">—</div>
  </div>
</header>

<div class="wedstrijd-title" id="wedstrijd-title"></div>

<div class="ronde-tabs" id="ronde-tabs" style="display:none;"></div>

<main id="main">
  <div class="state-box">
    <div class="icon">🏅</div>
    <p>Voer een wedstrijd-id in en klik op <strong>Laden</strong> om de live scores te bekijken.</p>
  </div>
</main>

<div class="legenda">
  <div class="legenda-item"><span class="legenda-dot" style="background:var(--pr)"></span>Persoonlijk record</div>
  <div class="legenda-item"><span class="legenda-dot" style="background:var(--season)"></span>Seizoensrecord</div>
  <div class="legenda-item"><span class="legenda-dot" style="background:rgba(59,130,246,0.5)"></span>Beste poging</div>
  <div class="legenda-item"><span class="legenda-dot" style="background:var(--nat)"></span>nat / afg. / b.s.</div>
</div>

<script>
const POLL_INTERVAL = 10000;
let pollTimer = null;
let actieveRonde = null;
let rondenData = {};

async function laadWedstrijd() {
  const id = document.getElementById('wedstrijd-id').value.trim();
  if (!id) return;

  clearInterval(pollTimer);
  toonLaden();

  await fetchEnRender(id);
  pollTimer = setInterval(() => fetchEnRender(id), POLL_INTERVAL);
}

async function fetchEnRender(id) {
  try {
    const res = await fetch(`/proxy?id_wedstrijd=${id}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const html = await res.text();
    parseEnRender(html);
    document.getElementById('update-time').textContent = 'bijgewerkt ' + new Date().toLocaleTimeString('nl-NL', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  } catch (err) {
    toonFout(err.message);
  }
}

function parseEnRender(html) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');

  // Wedstrijd titel
  const titelEl = doc.querySelector('table td[colspan="3"] center');
  if (titelEl) {
    const titleDiv = document.getElementById('wedstrijd-title');
    titleDiv.textContent = titelEl.innerText || titelEl.textContent;
    titleDiv.style.display = 'block';
  }

  // Vind alle ronden (Finale, Voorronde, etc.)
  // Ze zitten in <td colspan="3" align="center"> rijen
  const hoofdtabel = doc.querySelector('table[width="100%"][border="1"]');
  if (!hoofdtabel) { toonFout('Kon wedstrijddata niet lezen.'); return; }

  const rows = hoofdtabel.querySelectorAll('tr');
  rondenData = {};
  let huidigeRonde = null;

  rows.forEach(row => {
    // Check of dit een ronde-header is
    const rondeCell = row.querySelector('td[colspan="3"][align="center"]');
    if (rondeCell) {
      huidigeRonde = rondeCell.textContent.trim();
      if (!rondenData[huidigeRonde]) rondenData[huidigeRonde] = [];
      return;
    }

    // Schansen zitten als <td valign="top"> in een rij
    const schansCellen = row.querySelectorAll('td[valign="top"]');
    if (schansCellen.length > 0 && huidigeRonde) {
      const schansen = [];
      schansCellen.forEach(cel => {
        const schansData = parseSchans(cel);
        if (schansData.length > 0) schansen.push(schansData);
      });
      if (schansen.length > 0) rondenData[huidigeRonde] = schansen;
    }
  });

  // Tabs bouwen
  bouwRondeTabs();
  // Toon actieve ronde
  if (!actieveRonde || !rondenData[actieveRonde]) {
    actieveRonde = Object.keys(rondenData)[0];
  }
  renderRonde(actieveRonde);
}

function parseSchans(cel) {
  const tabellen = cel.querySelectorAll('table');
  const categorieen = [];

  tabellen.forEach(tabel => {
    // Categorie naam uit header rij met bgcolor=FAFAD2
    const catHeader = tabel.querySelector('td[bgcolor="FAFAD2"] font[color="blue"]');
    if (!catHeader) return;
    const catNaam = catHeader.textContent.trim();

    // Kolom headers
    const headerRij = tabel.querySelector('tr[bgcolor="FAFAD2"]');
    if (!headerRij) return;
    const kolommen = [...headerRij.querySelectorAll('td')].map(td => td.textContent.trim().toLowerCase());

    // Data rijen
    const springers = [];
    const dataRijen = tabel.querySelectorAll('tr.tekstklein[height]');

    dataRijen.forEach((rij, idx) => {
      const cellen = rij.querySelectorAll('td');
      if (cellen.length < 4) return;

      const nrEl = cellen[0];
      const naamEl = rij.querySelector('a[class="LINKPBH"]') || rij.querySelector('a');
      const naam = naamEl ? naamEl.textContent.replace(/\(F\s*\d+\)/g, '').replace(/\s+/g, ' ').trim() : '';
      const isItalic = !!rij.querySelector('i');

      // Afstanden: alle cellen na naam en PR
      const afstandCellen = [...cellen].slice(4);

      const afstanden = afstandCellen.map(cel => {
        const tekst = cel.textContent.trim();
        const bg = (cel.getAttribute('bgcolor') || '').toUpperCase();
        const bold = !!cel.querySelector('font[style*="bold"]') || cel.querySelector('font') && cel.innerHTML.includes('font-weight: bold');
        let type = 'normaal';
        if (bg === 'YELLOW') type = 'season';
        if (bg === '#FF6600' || bg === 'FF6600') type = 'pr';
        if (tekst === 'nat' || tekst === 'afg.' || tekst === 'b.s.') type = 'misslukt';
        if (!tekst || tekst === '&nbsp;') type = 'leeg';
        return { tekst, type };
      });

      // Laatste cel = plaats
      const plaatsEl = cellen[cellen.length - 1];
      const plaats = plaatsEl.textContent.trim();

      // Beste afstand bepalen
      let besteIdx = -1;
      let besteWaarde = -1;
      afstanden.forEach((a, i) => {
        if (i === afstanden.length - 1) return; // skip plaatskolom
        const v = parseFloat(a.tekst);
        if (!isNaN(v) && v > besteWaarde) { besteWaarde = v; besteIdx = i; }
      });

      // Afstanden zonder plaatskolom
      const pogingen = afstanden.slice(0, -1);

      springers.push({
        nr: idx + 1,
        startnr: cellen[0].textContent.trim(),
        naam,
        isItalic,
        pogingen,
        besteIdx,
        beste: besteWaarde > 0 ? besteWaarde.toFixed(2) : null,
        plaats,
      });
    });

    if (springers.length > 0) {
      categorieen.push({ naam: catNaam, springers });
    }
  });

  return categorieen;
}

function bouwRondeTabs() {
  const tabsEl = document.getElementById('ronde-tabs');
  tabsEl.innerHTML = '';
  tabsEl.style.display = 'flex';

  Object.keys(rondenData).forEach(ronde => {
    const btn = document.createElement('button');
    btn.className = 'ronde-tab' + (ronde === actieveRonde ? ' active' : '');
    btn.textContent = ronde;
    btn.onclick = () => {
      actieveRonde = ronde;
      document.querySelectorAll('.ronde-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderRonde(ronde);
    };
    tabsEl.appendChild(btn);
  });
}

function renderRonde(ronde) {
  const main = document.getElementById('main');
  const schansen = rondenData[ronde];

  if (!schansen || schansen.length === 0) {
    main.innerHTML = '<div class="state-box"><p>Geen data voor deze ronde.</p></div>';
    return;
  }

  const grid = document.createElement('div');
  grid.className = 'schansen-grid';

  schansen.forEach((schansCategorieen, si) => {
    const card = document.createElement('div');
    card.className = 'schans-card';

    const header = document.createElement('div');
    header.className = 'schans-header';
    header.innerHTML = `<span class="schans-title">Schans ${si + 1}</span>`;
    card.appendChild(header);

    schansCategorieen.forEach(cat => {
      const block = document.createElement('div');
      block.className = 'categorie-block';

      const beste = cat.springers.reduce((b, s) => {
        const v = parseFloat(s.beste);
        return (!isNaN(v) && v > b.v) ? { v, naam: s.naam } : b;
      }, { v: -1, naam: null });

      block.innerHTML = `
        <div class="cat-header">
          <span class="cat-label">${cat.naam}</span>
          ${beste.naam ? `<span class="cat-best">Best: <strong>${beste.v.toFixed(2)} m</strong></span>` : ''}
        </div>
      `;

      const tabel = document.createElement('table');
      tabel.className = 'springer-table';

      // Kolom headers — gebruik de kolommen van de eerste springer om te bepalen hoeveel pogingen
      const aantalPogingen = cat.springers[0]?.pogingen.length || 3;
      const pogingLabels = aantalPogingen === 2
        ? ['F1', 'F2']
        : aantalPogingen >= 3
          ? ['P1', 'P2', 'P3']
          : Array.from({length: aantalPogingen}, (_, i) => `P${i+1}`);

      tabel.innerHTML = `<thead><tr>
        <th class="left" style="width:22px">#</th>
        <th class="left">Naam</th>
        ${pogingLabels.map(l => `<th>${l}</th>`).join('')}
        <th>St.</th>
      </tr></thead>`;

      const tbody = document.createElement('tbody');
      cat.springers.forEach((s, idx) => {
        const tr = document.createElement('tr');

        const pogingCellen = s.pogingen.map((p, pi) => {
          let cls = 'td-afstand';
          if (pi === s.besteIdx) cls += ' best';
          if (p.type === 'pr') cls += ' is-pr';
          else if (p.type === 'season') cls += ' is-season';
          else if (p.type === 'misslukt') cls += ' is-nat';
          else if (p.type === 'leeg') cls += ' is-empty';
          const weergave = p.type === 'leeg' ? '—' : p.tekst;
          return `<td class="${cls}">${weergave}</td>`;
        }).join('');

        let standHtml = '';
        const pl = parseInt(s.plaats);
        if (!isNaN(pl)) {
          if (pl === 1) standHtml = `<span class="stand-badge stand-1">1</span>`;
          else if (pl === 2) standHtml = `<span class="stand-badge stand-2">2</span>`;
          else if (pl === 3) standHtml = `<span class="stand-badge stand-3">3</span>`;
          else standHtml = `<span class="stand-other">${pl}</span>`;
        } else {
          standHtml = `<span class="stand-other">—</span>`;
        }

        tr.innerHTML = `
          <td class="td-nr">${s.nr}</td>
          <td class="td-naam${s.isItalic ? ' italic' : ''}" title="${s.naam}">${s.naam}</td>
          ${pogingCellen}
          <td class="td-stand">${standHtml}</td>
        `;
        tbody.appendChild(tr);
      });

      tabel.appendChild(tbody);
      block.appendChild(tabel);
      card.appendChild(block);
    });

    grid.appendChild(card);
  });

  main.innerHTML = '';
  main.appendChild(grid);
}

function toonLaden() {
  document.getElementById('main').innerHTML = `
    <div class="state-box">
      <div class="spinner"></div>
      <p>Wedstrijddata ophalen...</p>
    </div>`;
}

function toonFout(msg) {
  document.getElementById('main').innerHTML = `
    <div class="state-box">
      <div class="icon">⚠️</div>
      <p>Kon data niet laden: ${msg}<br><br>Controleer het wedstrijd-id en probeer opnieuw.</p>
    </div>`;
}

// Direct laden bij openen
window.addEventListener('load', () => laadWedstrijd());

// Enter in id-veld
